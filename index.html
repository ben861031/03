<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發文時程管制平台</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft JhengHei",sans-serif}
body{display:flex;height:100vh;background:#f4f7fb;color:#1f2937;overflow:hidden}
.sidebar{
width:56px;
background:#173153;
color:#fff;
padding:16px 8px;
overflow:hidden;
transition:.25s;
position:relative;
flex-shrink:0;
}

.sidebar:hover{
width:320px;
padding:20px;
overflow:auto;
}
.logo{
font-size:22px;
font-weight:bold;
margin-bottom:24px;
white-space:nowrap;
}
.logo-mark{width:24px;height:24px;stroke-width:1.8}
.expanded-logo{align-items:center;gap:10px}

.collapsed-logo{
display:flex;
justify-content:center;
align-items:center;
}

.expanded-logo{
display:none;
}

.sidebar:hover .collapsed-logo{
display:none;
}

.sidebar:hover .expanded-logo{
display:flex;
}

.sidebar .section,
.sidebar .nav,
.sidebar #forecastBox,
.sidebar .badge,
.sidebar div[style*="LINE通知"]{
opacity:0;
pointer-events:none;
transition:.15s;
}

.sidebar:hover .section,
.sidebar:hover .nav,
.sidebar:hover #forecastBox,
.sidebar:hover .badge,
.sidebar:hover div[style*="LINE通知"]{
opacity:1;
pointer-events:auto;
}
.section{font-size:13px;opacity:.7;margin:18px 0 10px}
.nav{display:flex;justify-content:space-between;align-items:center;padding:14px;border-radius:14px;margin-bottom:8px;background:#295287;cursor:pointer;transition:.2s;white-space:nowrap;overflow:hidden}
.nav:hover{background:#35639c}
.nav.active{background:#4f7fc0}
.nav-label{display:flex;align-items:center;gap:10px}
.nav-icon{width:19px;height:19px;flex:0 0 19px;stroke-width:1.8}
.data-nav{color:#e8f0fb}
.badge{background:#ffffff22;padding:4px 10px;border-radius:999px}
.forecast-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:12px;margin-bottom:6px;background:#ffffff10;cursor:pointer;transition:.2s}
.forecast-item:hover{background:#ffffff25;transform:translateX(2px)}
.forecast-item.active{outline:2px solid #fff;background:#4f7fc0}
.forecast-today{background:#ffe082;color:#000;font-weight:bold}
.forecast-danger{background:#7f1d1d}
.main{flex:1;padding:24px;overflow:auto}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:20px}
.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;border:1px solid transparent;padding:9px 14px;border-radius:10px;font-weight:700;cursor:pointer;transition:background .18s,border-color .18s,box-shadow .18s,transform .18s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(15,23,42,.12)}
.btn-icon{width:18px;height:18px;flex:0 0 18px;stroke-width:2}
.green{background:#15803d;color:#fff}
.blue{background:#2563eb;color:#fff}
.red{background:#dc2626;color:#fff}
.orange{background:#d97706;color:#fff}
.secondary{background:#4b6584;color:#fff;border-color:#4b6584}
.secondary:hover{background:#405672;border-color:#405672}
.primary-import{background:#2563eb;color:#fff;border-color:#2563eb}
.primary-import:hover{background:#1d4ed8;border-color:#1d4ed8;box-shadow:0 4px 10px rgba(15,23,42,.12)}
.success-soft{background:#f59e0b;color:#fff;border-color:#f59e0b}
.success-soft:hover{background:#d97706;border-color:#d97706}
.danger-soft{background:#dc2626;color:#fff;border-color:#dc2626}
.danger-soft:hover{background:#b91c1c;border-color:#b91c1c}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:18px}
.card{background:white;padding:20px;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card h2{font-size:32px;margin-top:10px}
.warning{background:#fee2e2;color:#991b1b;padding:14px;border-radius:14px;margin-bottom:18px;font-weight:bold}
.table-wrap{background:white;padding:20px;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}

table{
width:100%;
border-collapse:collapse;
}

th:nth-child(1), td:nth-child(1){width:40px}
th:nth-child(2), td:nth-child(2){
width:auto;
}
th:nth-child(4), td:nth-child(4){
width:90px;
white-space:nowrap;
text-align:center;
}
th:nth-child(5), td:nth-child(5),
th:nth-child(6), td:nth-child(6){
width:110px;
white-space:nowrap;
text-align:center;
}
th:nth-child(7), td:nth-child(7){width:120px}
th:nth-child(8), td:nth-child(8){width:90px}
th:nth-child(9), td:nth-child(9){width:90px}

td{
line-height:1.9;
word-break:break-word;
vertical-align:top;
}

th{background:#edf3fb;padding:12px;text-align:left}
td{padding:12px;border-bottom:1px solid #eee;vertical-align:top}
.overdue-row{background:#fff1f2}
.done-row{background:#f0fdf4}
.pill{padding:8px 14px;border-radius:999px;font-weight:bold;display:inline-block;cursor:pointer;min-width:70px;text-align:center;font-size:14px}
.send-pill{background:#dbeafe}
.display-pill{background:#f3f4f6}
.status-btn{padding:8px 12px;border:none;border-radius:999px;font-weight:bold;cursor:pointer}
.pending{background:#fef3c7;color:#92400e}
.done{background:#d1fae5;color:#065f46}
.note{width:90px;padding:6px;border-radius:10px;border:1px solid #ddd;font-size:13px}
.hidden-date{position:absolute;opacity:0;width:1px;pointer-events:none}
.subject-link{
color:#2563eb;
text-decoration:none;
font-weight:600;
}
.subject-link:hover{
text-decoration:underline;
}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);justify-content:center;align-items:center;z-index:99999}
.modal-box{background:white;width:900px;max-width:95%;padding:24px;border-radius:20px}
.preview-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0}
.preview-stat{padding:14px;border:1px solid #dbe3ee;border-radius:12px;background:#f8fafc}
.preview-stat strong{display:block;font-size:26px;margin-top:4px}
.preview-stat.danger{background:#fff5f5;border-color:#fecaca;color:#991b1b}
.preview-list{max-height:130px;overflow:auto;margin-top:8px;padding:10px 12px;background:#f8fafc;border-radius:10px;font-size:14px;line-height:1.7}
.preview-list:empty::before{content:"無";color:#6b7280}
.select-all{width:17px;height:17px;cursor:pointer}
.toolbar input[type="date"], .toolbar select{padding:10px;border-radius:10px;border:1px solid #ccc;background:white}
.search-wrap{display:flex;align-items:center;gap:6px;min-width:280px}
.search-wrap input{flex:1;min-width:0}
.muted-btn{background:#eef2f7;color:#334155;border-color:#d8e0eb}
.muted-btn:hover{background:#e2e8f0;border-color:#cbd5e1}
.sort-btn{display:inline-flex;align-items:center;gap:5px;border:0;background:transparent;color:inherit;font:inherit;font-weight:700;cursor:pointer;padding:0}
.sort-btn:hover{color:#1d4ed8}
.sort-mark{font-size:11px;color:#64748b}
.toast{position:fixed;right:24px;bottom:24px;z-index:100000;background:#173153;color:white;padding:12px 16px;border-radius:12px;box-shadow:0 10px 24px rgba(15,23,42,.22);font-weight:700;opacity:0;pointer-events:none;transform:translateY(8px);transition:.2s}
.toast.show{opacity:1;transform:translateY(0)}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:18px}
.pagination-info{width:100%;text-align:center;font-weight:700;color:#334155;margin-bottom:2px}
.page-btn{min-width:44px;min-height:44px;border:1px solid #dbe3ee;background:#f1f5f9;color:#0f172a;border-radius:10px;font-weight:800;cursor:pointer}
.page-btn:hover{background:#e2e8f0}
.page-btn.active{background:#2563eb;color:white;border-color:#2563eb;box-shadow:0 4px 10px rgba(37,99,235,.22)}
.page-btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;transform:none}
.page-nav{padding:0 18px;background:#2563eb;color:white;border-color:#2563eb}
.page-ellipsis{min-width:24px;text-align:center;color:#64748b;font-weight:800}
table{table-layout:auto}
th,td{padding:14px 10px;vertical-align:top}
th:nth-child(1), td:nth-child(1){width:40px;min-width:40px}
th:nth-child(2), td:nth-child(2){width:110px;min-width:110px;white-space:nowrap}
th:nth-child(3), td:nth-child(3){width:35%;min-width:280px;max-width:500px;line-height:1.8}
th:nth-child(4), td:nth-child(4){width:80px;min-width:80px;text-align:center;white-space:nowrap}
th:nth-child(5), td:nth-child(5),
th:nth-child(6), td:nth-child(6){width:90px;min-width:90px;text-align:center;white-space:nowrap}
th:nth-child(7), td:nth-child(7){width:90px;min-width:90px;text-align:center}
th:nth-child(8), td:nth-child(8){width:120px;min-width:120px}
th:nth-child(9), td:nth-child(9){width:60px;min-width:60px;white-space:nowrap;text-align:center}
th:nth-child(10), td:nth-child(10){width:60px;min-width:60px;text-align:center}
td:nth-child(3) a{display:block;line-height:1.8;word-break:break-word}
.status-btn{padding:6px 10px !important;font-size:13px;width:82px}
.table-wrap{overflow-x:auto}
.note{width:80px !important}
.pill{min-width:64px !important;font-size:13px !important}
.table-scroll{height:520px;overflow-y:auto;overflow-x:auto;border-radius:12px}
.table-scroll thead th{position:sticky;top:0;z-index:10;background:#edf3fb !important;box-shadow:0 2px 4px rgba(0,0,0,.08)}
.done-cell{white-space:nowrap;font-size:13px}
.note{width:110px !important}
.subject-link{display:block;line-height:1.7}
#doneFilterArea{align-items:center;gap:12px;margin-left:24px;padding-left:12px;border-left:1px solid #e5e7eb}
#doneFilterArea input[type="date"]{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;background:#fff}
#doneFilterArea .btn{margin-left:6px}
</style>
</head>

<body>

<div class="sidebar">

<div class="logo collapsed-logo">
☰
</div>

<div class="logo expanded-logo">
<svg class="logo-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
<rect x="3" y="5" width="18" height="14" rx="2"></rect>
<path d="m3 7 9 6 9-6"></path>
</svg>
<span>發文時程管制平台</span>
</div>

<div class="nav data-nav" onclick="exportBackup()">

匯出備份

匯入備份

</div>


</div>

<div class="main">

<div class="topbar">
<h1 id="pageTitle">尚待發文</h1>

<button class="btn primary-import" onclick="openImport()">

<div class="table-wrap">

<script>

let docs = JSON.parse(localStorage.getItem('dispatch_v7_stable') || '[]');

docs.forEach(d=>{

if(d.status !== '已發文' || !d.doneTime) return;

if(
d.doneTime.includes('上午') ||
d.doneTime.includes('下午')
){

const m = d.doneTime.match(
/(\d+)\/(\d+)\/(\d+)\s*(上午|下午)(\d+):(\d+):(\d+)/
);

if(m){

let hour = Number(m[5]);

if(m[4] === '下午' && hour < 12){
    hour += 12;
}

if(m[4] === '上午' && hour === 12){
    hour = 0;
}

d.doneTimestamp = new Date(
`${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')} ${String(hour).padStart(2,'0')}:${m[6]}`
).getTime();

d.doneTime =
`${m[1]}/${String(m[2]).padStart(2,'0')}/${String(m[3]).padStart(2,'0')} ${String(hour).padStart(2,'0')}:${String(m[6]).padStart(2,'0')}`;

}

}else{

const dateObj = new Date(d.doneTime);

if(!isNaN(dateObj)){

d.doneTimestamp = dateObj.getTime();

d.doneTime =
dateObj.getFullYear() + '/' +
String(dateObj.getMonth()+1).padStart(2,'0') + '/' +
String(dateObj.getDate()).padStart(2,'0') + ' ' +
String(dateObj.getHours()).padStart(2,'0') + ':' +
String(dateObj.getMinutes()).padStart(2,'0');

}

}

});

localStorage.setItem(
'dispatch_v7_stable',
JSON.stringify(docs)
);

let currentFilter = 'pending';
let selectedForecastDate = '';
let pendingImportPlan = null;
let currentPage = 1;
let sortState = { key: '', direction: 'asc' };
let linkMode = localStorage.getItem('dispatch_link_mode') || 'auto';
const pageSize = 20;
const internalSinoSignHost = 'iiseng.sinotech-eng.com';
const externalSinoSignHost = 'web.sinotech-eng.com';
const dispatchListPath = '/SinoForm/Doc/Dispatch';
const dispatchDetailPath = '/SinoForm/Doc/Dispatch1/';
const signEditPath = '/SinoSign/Form/Edit/';

function getLocalDateString(date = new Date()){

return (
date.getFullYear() + '-' +
String(date.getMonth()+1).padStart(2,'0') + '-' +
String(date.getDate()).padStart(2,'0')
);

}

function getLocalDateTimestamp(dateString,endOfDay=false){

const [year,month,day]=dateString.split('-').map(Number);

return new Date(
year,
month-1,
day,
endOfDay ? 23 : 0,
endOfDay ? 59 : 0,
endOfDay ? 59 : 0,
endOfDay ? 999 : 0
).getTime();

}

function getDoneInfo(){

const now = new Date();

return {
    timestamp: now.getTime(),
    display:
        now.getFullYear() + '/' +
        String(now.getMonth()+1).padStart(2,'0') + '/' +
        String(now.getDate()).padStart(2,'0') + ' ' +
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0')
};

}

function escapeHTML(value){
return String(value ?? '')
.replace(/&/g,'&amp;')
.replace(/</g,'&lt;')
.replace(/>/g,'&gt;')
.replace(/"/g,'&quot;')
.replace(/'/g,'&#039;');
}

function normalizeText(value){
return String(value ?? '').toLowerCase().replace(/\s+/g,'');
}

function getEffectiveLinkMode(){
if(linkMode !== 'auto'){
return linkMode;
}

return location.hostname === internalSinoSignHost ? 'internal' : 'external';
}

function getSmartUrl(rawUrl){
if(!rawUrl){
return '';
}

try{
const url = new URL(rawUrl);
const isSinoSignEdit =
(url.hostname === internalSinoSignHost || url.hostname === externalSinoSignHost) &&
url.pathname.startsWith('/SinoSign/Form/Edit/');

if(!isSinoSignEdit){
return rawUrl;
}

url.protocol = 'https:';
url.hostname = getEffectiveLinkMode() === 'internal'
? internalSinoSignHost
: externalSinoSignHost;

if(getEffectiveLinkMode() === 'internal'){
url.protocol = 'http:';
}

return url.toString();
}catch(err){
return rawUrl;
}
}

function getSmartBaseUrl(){
return getEffectiveLinkMode() === 'internal'
? `http://${internalSinoSignHost}`
: `https://${externalSinoSignHost}`;
}

function extractFormId(rawUrl){
if(!rawUrl){
return '';
}

try{
const url = new URL(rawUrl);
const match = url.pathname.match(/\/(?:SinoSign\/Form\/Edit|SinoForm\/Doc\/Dispatch1)\/([^/?#]+)/i);
return match ? match[1] : '';
}catch(err){
const match = String(rawUrl).match(/\/(?:SinoSign\/Form\/Edit|SinoForm\/Doc\/Dispatch1)\/([^/?#]+)/i);
return match ? match[1] : '';
}
}

function getSignEditUrl(rawUrl){
const id=extractFormId(rawUrl);
return id ? `${getSmartBaseUrl()}${signEditPath}${id}` : getSmartUrl(rawUrl);
}

function getDispatchDetailUrl(rawUrl){
const id=extractFormId(rawUrl);
return id ? `${getSmartBaseUrl()}${dispatchDetailPath}${id}` : '';
}

function getDispatchListUrl(){
return `${getSmartBaseUrl()}${dispatchListPath}`;
}

function getLinkModeLabel(){
const mode=getEffectiveLinkMode();
return mode === 'internal' ? '公司內連結' : '公司外連結';
}

function cleanLine(text){
return text
.replace(/\*\*/g,'')
.replace(/函``/g,'')
.replace(/\[|\]/g,'')
.replace(/\(https?:\/\/[^\s]+\)/g,'')
.replace(/https?:\/\/[^\s]+/g,'')
.replace(/\s+/g,' ')
.trim();
}



function confirmImport(){

const editor = document.getElementById('importText');

const htmlContent = editor.innerHTML;
const textContent = editor.innerText;

if(!textContent.trim()){
alert('尚未貼上任何資料，未執行匯入。');
return;
}

const parser = new DOMParser();
const parsed = parser.parseFromString(htmlContent,'text/html');

const links = [...parsed.querySelectorAll('a')];

const linkEntries = [];

links.forEach(link=>{

const text = cleanLine(link.innerText);
const href = link.href;

if(text && href){
linkEntries.push({
text,
href,
used:false
});
}

});

function takeMatchingUrl(subject){

const exactMatch=linkEntries.find(entry=>
!entry.used &&
entry.text===subject
);

const match=exactMatch || linkEntries.find(entry=>
!entry.used &&
(subject.includes(entry.text) || entry.text.includes(subject))
);

if(!match){
return '';
}

match.used=true;
return match.href;

}

let lines = textContent.split('\n')
.map(v=>cleanLine(v))
.filter(v=>v && v!=='函');

const importedDocNos = [];
const parsedItems = [];
const seenDocNos = new Set();

for(let i=0;i<lines.length;i++){

if(/^[A-Z0-9]+$/.test(lines[i])){

const projectNo = lines[i];
const docNo = (lines[i+2] || '').replace(/[^\d]/g,'');

let subject='';
let handler='';
let url='';

for(let j=i+3;j<i+8 && j<lines.length;j++){

if(lines[j].length >= 8 && !subject){

subject = lines[j];
url = takeMatchingUrl(subject);

continue;

}

if(/^[\u4e00-\u9fa5]{2,4}$/.test(lines[j])){
handler = lines[j];
break;
}

}

if(docNo && subject){

if(seenDocNos.has(docNo)){
continue;
}

seenDocNos.add(docNo);
importedDocNos.push(docNo);

const order = importedDocNos.length;
parsedItems.push({
projectNo,
docNo,
subject,
handler,
url:url,
sortOrder:order
});

}

}

}

if(importedDocNos.length===0){
alert('未解析到有效的發文資料，未變更任何既有資料。請確認貼上的內容格式是否正確。');
return;
}

const importedSet = new Set(importedDocNos);
const newItems = parsedItems.filter(item=>!docs.some(d=>d.docNo===item.docNo));
const existingItems = parsedItems.filter(item=>docs.some(d=>d.docNo===item.docNo));
const autoDoneItems = docs.filter(d=>
d.status==='待發' &&
!importedSet.has(d.docNo)
);

pendingImportPlan = {
parsedItems,
newItems,
existingItems,
autoDoneItems,
importedSet
};

document.getElementById('previewAddedCount').innerText=newItems.length;
document.getElementById('previewExistingCount').innerText=existingItems.length;
document.getElementById('previewAutoDoneCount').innerText=autoDoneItems.length;

fillPreviewList('previewAddedList',newItems);
fillPreviewList('previewExistingList',existingItems);
fillPreviewList('previewAutoDoneList',autoDoneItems);

document.getElementById('importPreviewModal').style.display='flex';

}

function fillPreviewList(elementId,items){

const box=document.getElementById(elementId);
box.innerHTML='';

items.forEach(item=>{
const div=document.createElement('div');
div.textContent=`${item.docNo || '無文號'}　${item.subject || ''}`;
box.appendChild(div);
});

}

function closeImportPreview(){
pendingImportPlan=null;
document.getElementById('importPreviewModal').style.display='none';
}

function executeImport(){

if(!pendingImportPlan){
alert('沒有可執行的同步內容。');
return;
}

pendingImportPlan.parsedItems.forEach(item=>{

const existingDoc=docs.find(d=>d.docNo===item.docNo);

if(existingDoc){
existingDoc.sortOrder=item.sortOrder;
if(item.url) existingDoc.url=item.url;
return;
}

docs.push({
projectNo:item.projectNo,
docNo:item.docNo,
subject:item.subject,
handler:item.handler,
sendDate:'',
displayDate:'',
status:'待發',
doneTime:'',
doneTimestamp:0,
note:'',
url:item.url,
sortOrder:item.sortOrder
});

});

pendingImportPlan.autoDoneItems.forEach(item=>{

const doc=docs.find(d=>d.docNo===item.docNo);

if(doc && doc.status==='待發'){
const doneInfo=getDoneInfo();
doc.status='已發文';
doc.doneTimestamp=doneInfo.timestamp;
doc.doneTime=doneInfo.display;
}

});

const added=pendingImportPlan.newItems.length;
const autoDone=pendingImportPlan.autoDoneItems.length;
const hasNoDate=docs.some(d=>d.status!=='已發文' && !d.sendDate);

if(hasNoDate){
currentFilter='nodate';
selectedForecastDate='';
currentPage=1;

document.querySelectorAll('.nav').forEach(v=>v.classList.remove('active'));
document.getElementById('navNodate').classList.add('active');
document.getElementById('pageTitle').innerText='未設定日期';
document.getElementById('doneFilterArea').style.display='none';
document.getElementById('excelExportArea').style.display='none';
}

save();
render();
document.getElementById('importText').innerHTML = '';
document.getElementById('importPreviewModal').style.display='none';
pendingImportPlan=null;
closeImport();

alert(
`同步完成

新增：${added} 筆
自動完成：${autoDone} 筆`
);

}

function importBackup(event){

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

try{

const imported = JSON.parse(e.target.result);

if(!Array.isArray(imported)){

alert('備份格式錯誤');
return;

}

if(!confirm(`確定匯入 ${imported.length} 筆資料？\n目前資料將被覆蓋。`)){
return;
}

docs = imported;

save();
render();

alert('備份匯入完成');

}catch(err){

alert('JSON格式錯誤');

}

};

reader.readAsText(file);

}


function render(){

const tbody = document.getElementById('tbody');

tbody.innerHTML='';

const isDonePage = currentFilter==='done';

document.querySelectorAll('.done-column').forEach(v=>{
v.style.display = isDonePage ? '' : 'none';
});

document.querySelectorAll('.done-cell').forEach(v=>{
v.style.display = isDonePage ? '' : 'none';
});


const now = new Date();
const todayFull = getLocalDateString(now);
const search = normalizeText(document.getElementById('search').value || '');

const doneStartDate =
document.getElementById('doneStartDate')?.value || '';

const doneEndDate =
document.getElementById('doneEndDate')?.value || '';

let pending=0,nodateCount=0,todayCount=0,overdue=0,done=0;

docs.forEach(v=>{
if(v.status!=='已發文') pending++;
if(v.status!=='已發文' && !v.sendDate) nodateCount++;
if(v.sendDate===todayFull && v.status!=='已發文') todayCount++;
if(v.sendDate && v.sendDate<todayFull && v.status!=='已發文') overdue++;
if(v.status==='已發文') done++;
});

let rows = [];

docs.forEach((d,i)=>{

const text = normalizeText(`${d.docNo} ${d.subject} ${d.handler} ${d.note || ''}`);

if(search && !text.includes(search)) return;
if(currentFilter==='pending' && d.status==='已發文') return;
if(currentFilter==='nodate' && !(d.status!=='已發文' && !d.sendDate)) return;
if(currentFilter==='today' && !(d.sendDate===todayFull && d.status!=='已發文')) return;
if(currentFilter==='overdue' && !(d.sendDate && d.sendDate<todayFull && d.status!=='已發文')) return;
if(currentFilter==='done' && d.status!=='已發文') return;
if(currentFilter==='forecast' && !(d.sendDate===selectedForecastDate && d.status!=='已發文')) return;

if(currentFilter==='done'){

if(doneStartDate){

const start =
getLocalDateTimestamp(doneStartDate);

if((d.doneTimestamp||0) < start){
return;
}

}

if(doneEndDate){

const end =
getLocalDateTimestamp(doneEndDate,true);

if((d.doneTimestamp||0) > end){
return;
}

}

}

rows.push({d,i});

})

if(sortState.key){
rows.sort((a,b)=>{
const direction=sortState.direction==='asc' ? 1 : -1;

if(sortState.key==='doneTime'){
return ((a.d.doneTimestamp || 0) - (b.d.doneTimestamp || 0)) * direction;
}

const av=normalizeText(a.d[sortState.key] || '');
const bv=normalizeText(b.d[sortState.key] || '');

if(sortState.key==='docNo'){
return (Number(a.d.docNo || 0) - Number(b.d.docNo || 0)) * direction;
}

return av.localeCompare(bv,'zh-Hant') * direction;
});
}else if(currentFilter==='done'){
rows.sort((a,b)=>
(b.d.doneTimestamp || 0)
-
(a.d.doneTimestamp || 0)
);
}else{
rows.sort((a,b)=>(a.d.sortOrder||999999)-(b.d.sortOrder||999999));
}

const totalRows = rows.length;

if(currentFilter==='done'){
const start=(currentPage-1)*pageSize;
rows=rows.slice(start,start+pageSize);
}else{
currentPage=1;
}

rows.forEach(({d,i})=>{

const tr = document.createElement('tr');
const safeDocNo=escapeHTML(d.docNo);
const safeSubject=escapeHTML(d.subject);
const safeHandler=escapeHTML(d.handler);
const smartUrl=getSignEditUrl(d.url);
const dispatchUrl=getDispatchDetailUrl(d.url);
const safeUrl=escapeHTML(smartUrl);
const safeNote=escapeHTML(d.note || '');
const safeDoneTime=escapeHTML(d.doneTime || '');

if(d.status==='已發文'){
tr.classList.add('done-row');
}

if(d.sendDate && d.sendDate<todayFull && d.status!=='已發文'){
tr.classList.add('overdue-row');
}

if(d.sendDate && d.displayDate && d.sendDate!==d.displayDate){
tr.style.background='#fff3e0';
}

tr.innerHTML = `
<td><input type="checkbox" class="batch-check" data-index="${i}"></td>

<td>${safeDocNo}</td>

<td>
${d.url ? 
`<a class="subject-link" href="${safeUrl}" target="_blank" rel="noopener" title="${escapeHTML(getLinkModeLabel())}">${safeSubject}</a>` 
: safeSubject}
</td>

<td>${safeHandler}</td>

<td>
<div class="pill send-pill" onclick="openDateQuickModal(${i})">
${d.sendDate ? d.sendDate.replace(/^\d{4}-/,'').replace('-','/') : '未設定'}
</div>
<input id="send_${i}" class="hidden-date" type="date" value="${d.sendDate}" onchange="updateSend(${i},this.value)">
</td>

<td>
<div class="pill display-pill" onclick="openDateQuickModal(${i},'display')">
${d.displayDate ? d.displayDate.replace(/^\d{4}-/,'').replace('-','/') : '未設定'}
</div>
<input id="display_${i}" class="hidden-date" type="date" value="${d.displayDate}" onchange="updateDisplay(${i},this.value)">
</td>

<td>
<select 
class="status-btn ${d.status==='已發文'?'done':'pending'}"
onchange="changeStatus(${i},this.value)">
<option value="待發" ${d.status==='待發'?'selected':''}>待發</option>
<option value="已發文" ${d.status==='已發文'?'selected':''}>已發文</option>
</select>
</td>

<td>
<input class="note" value="${safeNote}" oninput="updateNote(${i},this.value)" placeholder="輸入備註">
</td>

${isDonePage ? `<td class="done-cell">${safeDoneTime}</td>` : ``}
<td>
${dispatchUrl ? `<button class="btn secondary" style="padding:6px 10px;min-height:34px;margin-right:4px;" onclick="openCompare(${i})" title="同時開啟發文作業與電子表單">
<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
<rect x="3" y="4" width="7" height="16" rx="1"></rect><rect x="14" y="4" width="7" height="16" rx="1"></rect>
</svg>
</button>` : ``}
<button class="btn danger-soft" style="padding:6px 10px;min-height:34px;" onclick="deleteDoc(${i})" title="刪除">
<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
<path d="M4 7h16"></path><path d="M9 7V4h6v3"></path><path d="m6 7 1 14h10l1-14"></path>
</svg>
</button>
</td>
`;

tbody.appendChild(tr);

});

const selectAll=document.getElementById('selectAllVisible');
const visibleChecks=[...document.querySelectorAll('.batch-check')];

selectAll.checked=false;
selectAll.indeterminate=false;
selectAll.disabled=visibleChecks.length===0;

visibleChecks.forEach(check=>{
check.addEventListener('change',updateSelectAllState);
});

document.querySelectorAll('[data-sort-mark]').forEach(mark=>{
mark.textContent = mark.dataset.sortMark===sortState.key
? (sortState.direction==='asc' ? '▲' : '▼')
: '';
});

document.getElementById('pendingBadge').innerText=pending;
document.getElementById('nodateBadge').innerText=nodateCount;
document.getElementById('todayBadge').innerText=todayCount;
document.getElementById('overdueBadge').innerText=overdue;
document.getElementById('doneBadge').innerText=done;

document.getElementById('pendingCount').innerText=pending;
document.getElementById('todayCount').innerText=todayCount;
document.getElementById('overdueCount').innerText=overdue;
document.getElementById('doneCount').innerText=done;



const warning = document.getElementById('warningBox');

if(overdue>0){
warning.style.display='block';
warning.innerText=`⚠ 目前有 ${overdue} 件已逾期未發文`;
}else{
warning.style.display='none';
}

renderForecast();

const pageBar=document.getElementById('paginationBar');
if(pageBar){
pageBar.innerHTML='';

if(currentFilter==='done'){

const totalPages=Math.ceil(totalRows/pageSize)||1;

const pagination=document.createElement('div');
pagination.className='pagination';

const info=document.createElement('div');
info.className='pagination-info';
info.textContent=`共 ${totalRows} 筆資料　第 ${currentPage} / ${totalPages} 頁`;
pagination.appendChild(info);

const prev=document.createElement('button');
prev.className='page-btn page-nav';
prev.textContent='上一頁';
prev.disabled=currentPage===1;
prev.onclick=()=>{currentPage--;render();};
pagination.appendChild(prev);

function getVisiblePages(total,current){
const pages=new Set([1,total,current,current-1,current+1]);

if(current<=4){
for(let p=1;p<=Math.min(5,total);p++) pages.add(p);
}

if(current>=total-3){
for(let p=Math.max(1,total-4);p<=total;p++) pages.add(p);
}

return [...pages]
.filter(p=>p>=1 && p<=total)
.sort((a,b)=>a-b);
}

let lastPage=0;
getVisiblePages(totalPages,currentPage).forEach(p=>{
if(lastPage && p-lastPage>1){
const ellipsis=document.createElement('span');
ellipsis.className='page-ellipsis';
ellipsis.textContent='…';
pagination.appendChild(ellipsis);
}

const b=document.createElement('button');
b.className='page-btn';
if(p===currentPage){
b.classList.add('active');
}
b.textContent=p;
b.onclick=()=>{currentPage=p;render();};
pagination.appendChild(b);
lastPage=p;
});

const next=document.createElement('button');
next.className='page-btn page-nav';
next.textContent='下一頁';
next.disabled=currentPage===totalPages;
next.onclick=()=>{currentPage++;render();};
pagination.appendChild(next);

pageBar.appendChild(pagination);
}

}

}

function toggleSelectAllVisible(checked){

document.querySelectorAll('.batch-check').forEach(check=>{
check.checked=checked;
});

updateSelectAllState();

}

function updateSelectAllState(){

const selectAll=document.getElementById('selectAllVisible');
const checks=[...document.querySelectorAll('.batch-check')];
const checkedCount=checks.filter(check=>check.checked).length;

selectAll.disabled=checks.length===0;
selectAll.checked=checks.length>0 && checkedCount===checks.length;
selectAll.indeterminate=checkedCount>0 && checkedCount<checks.length;

}

function renderForecast(){

const box = document.getElementById('forecastBox');
box.innerHTML='';

const today = new Date();

for(let i=0;i<7;i++){

const d = new Date();
d.setDate(today.getDate()+i);

const yyyy=d.getFullYear();
const mm=String(d.getMonth()+1).padStart(2,'0');
const dd=String(d.getDate()).padStart(2,'0');

const dateStr=`${yyyy}-${mm}-${dd}`;

const count = docs.filter(v=>v.sendDate===dateStr && v.status!=='已發文').length;

const div = document.createElement('div');

div.className='forecast-item';
div.title=`查看 ${mm}/${dd} 待發公文`;
div.onclick=()=>filterForecastDate(dateStr);

if(currentFilter==='forecast' && selectedForecastDate===dateStr){
div.classList.add('active');
}

if(i===0){
div.classList.add('forecast-today');
}

if(count>=5){
div.classList.add('forecast-danger');
}

div.innerHTML=`<span>${mm}/${dd}</span><span>${count} 件</span>`;

box.appendChild(div);

}

}


let activeDateIndex=null;
let activeDateMode='send';

function openDateQuickModal(i, mode='send') {
activeDateIndex = i;
activeDateMode = mode;

const title = document.getElementById('dateQuickModalTitle');
const input = document.getElementById('modalDateInput');

if (title) {
title.innerText = mode === 'display' ? '設定公文顯示日期' : '設定發文日期';
}

if (input) {
input.value = mode === 'display' ? (docs[i].displayDate || '') : (docs[i].sendDate || '');
}

document.getElementById('dateQuickModal').style.display = 'flex';
}

function closeDateQuickModal(){
document.getElementById('dateQuickModal').style.display='none';
}

function applyCustomDate(){
const val=document.getElementById('modalDateInput').value;
if(!val) return;

if(activeDateMode === 'display'){
updateDisplay(activeDateIndex,val);
}else{
updateSend(activeDateIndex,val);
}

closeDateQuickModal();
}

function updateSend(i,val){

docs[i].sendDate=val;

if(!docs[i].displayDate){
docs[i].displayDate=val;
}

save();
render();
showToast('發文日期已更新');

}

function quickDate(i,offset){

const d=new Date();
d.setDate(d.getDate()+offset);

const yyyy=d.getFullYear();
const mm=String(d.getMonth()+1).padStart(2,'0');
const dd=String(d.getDate()).padStart(2,'0');
const dateStr=`${yyyy}-${mm}-${dd}`;

if(activeDateMode === 'display'){
docs[i].displayDate=dateStr;
}else{
docs[i].sendDate=dateStr;

if(!docs[i].displayDate){
docs[i].displayDate=docs[i].sendDate;
}
}

save();
render();
showToast(activeDateMode === 'display' ? '顯示日期已更新' : '發文日期已更新');
}


function updateDisplay(i,val){
docs[i].displayDate=val;
save();
render();
showToast('顯示日期已更新');
}

function updateNote(i,val){
docs[i].note=val;
save();
}

function changeStatus(i,val){

docs[i].status = val;

if(val==='已發文'){

const doneInfo = getDoneInfo();

docs[i].doneTimestamp = doneInfo.timestamp;
docs[i].doneTime = doneInfo.display;

}else{

docs[i].doneTime = '';
docs[i].doneTimestamp = 0;

}

save();
render();
showToast(val==='已發文' ? '已標記為已發文' : '已改回待發');

}

function batchDone(){

const indexes = getCheckedIndexes();

if(indexes.length===0){

alert('請先勾選資料');
return;

}

indexes.forEach(i=>{

docs[i].status='已發文';

const doneInfo = getDoneInfo();

docs[i].doneTimestamp = doneInfo.timestamp;
docs[i].doneTime = doneInfo.display;

});

save();
render();

showToast(`已將 ${indexes.length} 筆資料標記為已發文`);

}



function deleteDoc(i){

if(confirm('確定刪除這筆資料？')){

docs.splice(i,1);

save();
render();
showToast('資料已刪除');

}

}

function batchDelete(){

const indexes = getCheckedIndexes();

if(indexes.length===0){

alert('請先勾選資料');
return;

}

if(!confirm(`確定刪除 ${indexes.length} 筆資料？`)){
return;
}

indexes.sort((a,b)=>b-a);

indexes.forEach(i=>{
docs.splice(i,1);
});

save();
render();

showToast(`已刪除 ${indexes.length} 筆資料`);

}

return false;
}

if(endDate){

if((v.doneTimestamp||0) > end){

(function(){
const today=getLocalDateString();

const overdueCount=docs.filter(v=>
v.sendDate &&
v.sendDate<today &&
v.status!=='已發文'
).length;

const todayCount=docs.filter(v=>v.sendDate===today && v.status!=='已發文').length;

const nodateCount=docs.filter(v=>
v.status!=='已發文' &&
!v.sendDate
).length;

document.querySelectorAll('.nav').forEach(v=>v.classList.remove('active'));

if(overdueCount>0){
currentFilter='overdue';
document.getElementById('pageTitle').innerText='已逾期';
document.getElementById('navOverdue').classList.add('active');
}else if(todayCount>0){
currentFilter='today';
document.getElementById('pageTitle').innerText='今日待發';
document.getElementById('navToday').classList.add('active');
}else if(nodateCount>0){
currentFilter='nodate';
document.getElementById('pageTitle').innerText='未設定日期';
document.getElementById('navNodate').classList.add('active');
}else{
currentFilter='pending';
document.getElementById('pageTitle').innerText='尚待發文';
document.getElementById('navPending').classList.add('active');
}
})();

document.getElementById('excelExportArea').style.display =
currentFilter === 'done'

: 'none';

}

render();
