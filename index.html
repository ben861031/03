<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>發文時程管制平台</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft JhengHei",sans-serif}
body{display:flex;height:100vh;background:#f4f7fb;color:#1f2937;overflow:hidden}
.sidebar{
width:56px;
background:#173153;
color:#fff;
padding:16px 8px;
overflow:hidden;
transition:.25s;
position:relative;
flex-shrink:0;
}

.sidebar:hover{
width:320px;
padding:20px;
overflow:auto;
}
.logo{
font-size:22px;
font-weight:bold;
margin-bottom:24px;
white-space:nowrap;
}
.logo-mark{width:24px;height:24px;stroke-width:1.8}
.expanded-logo{align-items:center;gap:10px}

.collapsed-logo{
display:flex;
justify-content:center;
align-items:center;
}

.expanded-logo{
display:none;
}

.sidebar:hover .collapsed-logo{
display:none;
}

.sidebar:hover .expanded-logo{
display:flex;
}

.sidebar .section,
.sidebar .nav,
.sidebar #forecastBox,
.sidebar .badge,
.sidebar div[style*="LINE通知"]{
opacity:0;
pointer-events:none;
transition:.15s;
}

.sidebar:hover .section,
.sidebar:hover .nav,
.sidebar:hover #forecastBox,
.sidebar:hover .badge,
.sidebar:hover div[style*="LINE通知"]{
opacity:1;
pointer-events:auto;
}
.section{font-size:13px;opacity:.7;margin:18px 0 10px}
.nav{display:flex;justify-content:space-between;align-items:center;padding:14px;border-radius:14px;margin-bottom:8px;background:#295287;cursor:pointer;transition:.2s;white-space:nowrap;overflow:hidden}
.nav:hover{background:#35639c}
.nav.active{background:#4f7fc0}
.nav-label{display:flex;align-items:center;gap:10px}
.nav-icon{width:19px;height:19px;flex:0 0 19px;stroke-width:1.8}
.data-nav{color:#e8f0fb}
.badge{background:#ffffff22;padding:4px 10px;border-radius:999px}
.forecast-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:12px;margin-bottom:6px;background:#ffffff10;cursor:pointer;transition:.2s}
.forecast-item:hover{background:#ffffff25;transform:translateX(2px)}
.forecast-item.active{outline:2px solid #fff;background:#4f7fc0}
.forecast-today{background:#ffe082;color:#000;font-weight:bold}
.forecast-danger{background:#7f1d1d}
.main{flex:1;padding:24px;overflow:auto}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:20px}
.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;border:1px solid transparent;padding:9px 14px;border-radius:10px;font-weight:700;cursor:pointer;transition:background .18s,border-color .18s,box-shadow .18s,transform .18s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(15,23,42,.12)}
.btn-icon{width:18px;height:18px;flex:0 0 18px;stroke-width:2}
.green{background:#15803d;color:#fff}
.blue{background:#2563eb;color:#fff}
.red{background:#dc2626;color:#fff}
.orange{background:#d97706;color:#fff}
.secondary{background:#fff;color:#245898;border-color:#b9cbe2}
.secondary:hover{background:#f3f7fc;border-color:#7da2cf}
.primary-import{background:#3568b8;color:#fff}
.primary-import:hover{background:#2f5fa8;box-shadow:none}
.success-soft{background:#e9f7ee;color:#14723a;border-color:#b9e3c8}
.success-soft:hover{background:#dff2e6}
.danger-soft{background:#fff;color:#c52b2b;border-color:#efb8b8}
.danger-soft:hover{background:#fff1f1}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:18px}
.card{background:white;padding:20px;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card h2{font-size:32px;margin-top:10px}
.warning{background:#fee2e2;color:#991b1b;padding:14px;border-radius:14px;margin-bottom:18px;font-weight:bold}
.table-wrap{background:white;padding:20px;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}

table{
width:100%;
border-collapse:collapse;
}

th:nth-child(1), td:nth-child(1){width:40px}
th:nth-child(2), td:nth-child(2){
width:auto;
}
th:nth-child(4), td:nth-child(4){
width:90px;
white-space:nowrap;
text-align:center;
}
th:nth-child(5), td:nth-child(5),
th:nth-child(6), td:nth-child(6){
width:110px;
white-space:nowrap;
text-align:center;
}
th:nth-child(7), td:nth-child(7){width:120px}
th:nth-child(8), td:nth-child(8){width:90px}
th:nth-child(9), td:nth-child(9){width:90px}

td{
line-height:1.9;
word-break:break-word;
vertical-align:top;
}

th{background:#edf3fb;padding:12px;text-align:left}
td{padding:12px;border-bottom:1px solid #eee;vertical-align:top}
.overdue-row{background:#fff1f2}
.done-row{background:#f0fdf4}
.pill{padding:8px 14px;border-radius:999px;font-weight:bold;display:inline-block;cursor:pointer;min-width:70px;text-align:center;font-size:14px}
.send-pill{background:#dbeafe}
.display-pill{background:#f3f4f6}
.status-btn{padding:8px 12px;border:none;border-radius:999px;font-weight:bold;cursor:pointer}
.pending{background:#fef3c7;color:#92400e}
.done{background:#d1fae5;color:#065f46}
.note{width:90px;padding:6px;border-radius:10px;border:1px solid #ddd;font-size:13px}
.hidden-date{position:absolute;opacity:0;width:1px;pointer-events:none}
.subject-link{
color:#2563eb;
text-decoration:none;
font-weight:600;
}
.subject-link:hover{
text-decoration:underline;
}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);justify-content:center;align-items:center;z-index:99999}
.modal-box{background:white;width:900px;max-width:95%;padding:24px;border-radius:20px}
.preview-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0}
.preview-stat{padding:14px;border:1px solid #dbe3ee;border-radius:12px;background:#f8fafc}
.preview-stat strong{display:block;font-size:26px;margin-top:4px}
.preview-stat.danger{background:#fff5f5;border-color:#fecaca;color:#991b1b}
.preview-list{max-height:130px;overflow:auto;margin-top:8px;padding:10px 12px;background:#f8fafc;border-radius:10px;font-size:14px;line-height:1.7}
.preview-list:empty::before{content:"無";color:#6b7280}
.select-all{width:17px;height:17px;cursor:pointer}
</style>
</head>

<body>

<div class="logo collapsed-logo">
☰
</div>

<svg class="logo-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

<div class="nav" id="navOverdue" onclick="setFilter('overdue',this)">

</div>

<div id="forecastBox"></div>

<div class="section"><span>資料管理</span></div>

<span class="nav-label">
<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

匯出備份

</div>

</svg>
匯入備份

</div>


</div>

<div class="main">

<div class="topbar">

<div class="top-actions">
<button class="btn primary-import" onclick="openImport()">
<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

匯出 Excel

</div>

<div id="warningBox" class="warning" style="display:none"></div>

<div class="cards">
<div class="card"><p>待處理</p><h2 id="pendingCount">0</h2></div>

<div class="table-wrap">

<div class="toolbar">

<input id="search"
placeholder="搜尋文號 / 主旨 / 承辦人"
style="padding:10px;border-radius:10px;border:1px solid #ccc;min-width:280px;">

查詢
</button>

<div class="table-scroll">
<table>
<thead>
<tr>
<th><input type="checkbox" id="selectAllVisible" class="select-all" title="全選目前畫面" onchange="toggleSelectAllVisible(this.checked)"></th>

<div class="modal" id="importModal">
<div class="modal-box">

<div 
id="importText"
contenteditable="true"
style="
width:100%;
height:320px;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
overflow:auto;
background:white;
white-space:pre-wrap;
"></div>

<div style="margin-top:14px;display:flex;gap:10px;">
<button class="btn green" onclick="confirmImport()">確認匯入</button>
<button class="btn blue" onclick="closeImport()">關閉</button>
</div>

<div class="modal" id="importPreviewModal">

<p style="margin-top:8px;color:#64748b;">請確認以下變更，按下「執行同步」後才會更新資料。</p>

<div class="preview-summary">
<div class="preview-stat">新增公文<strong id="previewAddedCount">0</strong></div>
<div class="preview-stat">既有公文<strong id="previewExistingCount">0</strong></div>

</div>

<button class="btn secondary" onclick="closeImportPreview()">返回檢查</button>
<button class="btn primary-import" onclick="executeImport()">執行同步</button>
</div>
</div>

<script>

let docs = JSON.parse(localStorage.getItem('dispatch_v7_stable') || '[]');

docs.forEach(d=>{

if(d.status !== '已發文' || !d.doneTime) return;

if(
d.doneTime.includes('上午') ||
d.doneTime.includes('下午')
){

const m = d.doneTime.match(
/(\d+)\/(\d+)\/(\d+)\s*(上午|下午)(\d+):(\d+):(\d+)/
);

if(m){

let hour = Number(m[5]);

if(m[4] === '下午' && hour < 12){
    hour += 12;
}

if(m[4] === '上午' && hour === 12){
    hour = 0;
}

d.doneTimestamp = new Date(
`${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')} ${String(hour).padStart(2,'0')}:${m[6]}`
).getTime();

d.doneTime =
`${m[1]}/${String(m[2]).padStart(2,'0')}/${String(m[3]).padStart(2,'0')} ${String(hour).padStart(2,'0')}:${String(m[6]).padStart(2,'0')}`;

}

}else{

const dateObj = new Date(d.doneTime);

if(!isNaN(dateObj)){

d.doneTimestamp = dateObj.getTime();

d.doneTime =
dateObj.getFullYear() + '/' +
String(dateObj.getMonth()+1).padStart(2,'0') + '/' +
String(dateObj.getDate()).padStart(2,'0') + ' ' +
String(dateObj.getHours()).padStart(2,'0') + ':' +
String(dateObj.getMinutes()).padStart(2,'0');

}

}

});

localStorage.setItem(
'dispatch_v7_stable',
JSON.stringify(docs)
);

let currentFilter = 'pending';
let selectedForecastDate = '';
let pendingImportPlan = null;
let currentPage = 1;
const pageSize = 20;

function getLocalDateString(date = new Date()){

return (
date.getFullYear() + '-' +
String(date.getMonth()+1).padStart(2,'0') + '-' +
String(date.getDate()).padStart(2,'0')
);

}

function getLocalDateTimestamp(dateString,endOfDay=false){

const [year,month,day]=dateString.split('-').map(Number);

return new Date(
year,
month-1,
day,
endOfDay ? 23 : 0,
endOfDay ? 59 : 0,
endOfDay ? 59 : 0,
endOfDay ? 999 : 0
).getTime();

}

function getDoneInfo(){

const now = new Date();

return {
    timestamp: now.getTime(),
    display:
        now.getFullYear() + '/' +
        String(now.getMonth()+1).padStart(2,'0') + '/' +
        String(now.getDate()).padStart(2,'0') + ' ' +
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0')
};

}

function save(){
localStorage.setItem('dispatch_v7_stable',JSON.stringify(docs));
}

function setFilter(type,el){

currentFilter = type;
selectedForecastDate = '';

document.querySelectorAll('.nav').forEach(v=>v.classList.remove('active'));

el.classList.add('active');

const titles = {
pending:'待處理發文',
nodate:'未設定日期',
today:'今日發文',
overdue:'已逾期',
done:'已發文'
};

document.getElementById('pageTitle').innerText = titles[type];

const dateControls = document.getElementById('doneFilterArea');

const excelArea =
document.getElementById('excelExportArea');

if(excelArea){

excelArea.style.display =
type === 'done'
? 'inline-block'
: 'none';

}

if(dateControls){

dateControls.style.display =
type === 'done'
? 'inline-flex'
: 'none';

}


render();

}

function filterForecastDate(dateStr){

currentFilter = 'forecast';
selectedForecastDate = dateStr;
currentPage = 1;

document.querySelectorAll('.nav').forEach(v=>v.classList.remove('active'));

const date = new Date(dateStr + 'T00:00:00');
const weekNames = ['日','一','二','三','四','五','六'];

document.getElementById('pageTitle').innerText =
`${date.getMonth()+1}月${date.getDate()}日（週${weekNames[date.getDay()]}）待發公文`;

document.getElementById('doneFilterArea').style.display = 'none';
document.getElementById('excelExportArea').style.display = 'none';

render();

}

function openImport(){
document.getElementById('importModal').style.display='flex';
}

function closeImport(){
document.getElementById('importModal').style.display='none';
}

function cleanLine(text){
return text
.replace(/\*\*/g,'')
.replace(/函``/g,'')
.replace(/\[|\]/g,'')
.replace(/\(https?:\/\/[^\s]+\)/g,'')
.replace(/https?:\/\/[^\s]+/g,'')
.replace(/\s+/g,' ')
.trim();
}



function confirmImport(){

const editor = document.getElementById('importText');

const htmlContent = editor.innerHTML;
const textContent = editor.innerText;

if(!textContent.trim()){
alert('尚未貼上任何資料，未執行匯入。');
return;
}

const parser = new DOMParser();
const parsed = parser.parseFromString(htmlContent,'text/html');

const links = [...parsed.querySelectorAll('a')];

const linkEntries = [];

links.forEach(link=>{

const text = cleanLine(link.innerText);
const href = link.href;

if(text && href){
linkEntries.push({
text,
href,
used:false
});
}

});

function takeMatchingUrl(subject){

const exactMatch=linkEntries.find(entry=>
!entry.used &&
entry.text===subject
);

const match=exactMatch || linkEntries.find(entry=>
!entry.used &&
(subject.includes(entry.text) || entry.text.includes(subject))
);

if(!match){
return '';
}

match.used=true;
return match.href;

}

let lines = textContent.split('\n')
.map(v=>cleanLine(v))
.filter(v=>v && v!=='函');

const importedDocNos = [];
const parsedItems = [];
const seenDocNos = new Set();

for(let i=0;i<lines.length;i++){

if(/^[A-Z0-9]+$/.test(lines[i])){

const projectNo = lines[i];
const docNo = (lines[i+2] || '').replace(/[^\d]/g,'');

let subject='';
let handler='';
let url='';

for(let j=i+3;j<i+8 && j<lines.length;j++){

if(lines[j].length >= 8 && !subject){

subject = lines[j];
url = takeMatchingUrl(subject);

continue;

}

if(/^[\u4e00-\u9fa5]{2,4}$/.test(lines[j])){
handler = lines[j];
break;
}

}

if(docNo && subject){

if(seenDocNos.has(docNo)){
continue;
}

seenDocNos.add(docNo);
importedDocNos.push(docNo);

const order = importedDocNos.length;
parsedItems.push({
projectNo,
docNo,
subject,
handler,
url:url,
sortOrder:order
});

}

}

}

if(importedDocNos.length===0){
alert('未解析到有效的發文資料，未變更任何既有資料。請確認貼上的內容格式是否正確。');
return;
}

const importedSet = new Set(importedDocNos);
const newItems = parsedItems.filter(item=>!docs.some(d=>d.docNo===item.docNo));
const existingItems = parsedItems.filter(item=>docs.some(d=>d.docNo===item.docNo));
const autoDoneItems = docs.filter(d=>
d.status==='待發' &&
!importedSet.has(d.docNo)
);

pendingImportPlan = {
parsedItems,
newItems,
existingItems,
autoDoneItems,
importedSet
};

document.getElementById('previewAddedCount').innerText=newItems.length;
document.getElementById('previewExistingCount').innerText=existingItems.length;
document.getElementById('previewAutoDoneCount').innerText=autoDoneItems.length;

fillPreviewList('previewAddedList',newItems);
fillPreviewList('previewExistingList',existingItems);
fillPreviewList('previewAutoDoneList',autoDoneItems);

document.getElementById('importPreviewModal').style.display='flex';

}

function fillPreviewList(elementId,items){

const box=document.getElementById(elementId);
box.innerHTML='';

items.forEach(item=>{
const div=document.createElement('div');
div.textContent=`${item.docNo || '無文號'}　${item.subject || ''}`;
box.appendChild(div);
});

}

function closeImportPreview(){
pendingImportPlan=null;
document.getElementById('importPreviewModal').style.display='none';
}

function executeImport(){

if(!pendingImportPlan){
alert('沒有可執行的同步內容。');
return;
}

pendingImportPlan.parsedItems.forEach(item=>{

const existingDoc=docs.find(d=>d.docNo===item.docNo);

if(existingDoc){
existingDoc.sortOrder=item.sortOrder;
if(item.url) existingDoc.url=item.url;
return;
}

docs.push({
projectNo:item.projectNo,
docNo:item.docNo,
subject:item.subject,
handler:item.handler,
sendDate:'',
displayDate:'',
status:'待發',
doneTime:'',
doneTimestamp:0,
note:'',
url:item.url,
sortOrder:item.sortOrder
});

});

pendingImportPlan.autoDoneItems.forEach(item=>{

const doc=docs.find(d=>d.docNo===item.docNo);

if(doc && doc.status==='待發'){
const doneInfo=getDoneInfo();
doc.status='已發文';
doc.doneTimestamp=doneInfo.timestamp;
doc.doneTime=doneInfo.display;
}

});

const added=pendingImportPlan.newItems.length;
const autoDone=pendingImportPlan.autoDoneItems.length;
const hasNoDate=docs.some(d=>d.status!=='已發文' && !d.sendDate);

if(hasNoDate){
currentFilter='nodate';
selectedForecastDate='';
currentPage=1;

document.querySelectorAll('.nav').forEach(v=>v.classList.remove('active'));
document.getElementById('navNodate').classList.add('active');
document.getElementById('pageTitle').innerText='未設定日期';
document.getElementById('doneFilterArea').style.display='none';
document.getElementById('excelExportArea').style.display='none';
}

save();
render();
document.getElementById('importText').innerHTML = '';
document.getElementById('importPreviewModal').style.display='none';
pendingImportPlan=null;
closeImport();

alert(
`同步完成

新增：${added} 筆
自動完成：${autoDone} 筆`
);

}



function exportBackup(){

const dataStr = JSON.stringify(docs,null,2);

const blob = new Blob([dataStr],{
type:'application/json'
});

const a = document.createElement('a');

const today = new Date();

const fileName =
'總收發備份_' +
today.getFullYear() +
String(today.getMonth()+1).padStart(2,'0') +
String(today.getDate()).padStart(2,'0') +
'.json';

a.href = URL.createObjectURL(blob);

a.download = fileName;

a.click();

}

function importBackup(event){

const file = event.target.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

try{

const imported = JSON.parse(e.target.result);

if(!Array.isArray(imported)){

alert('備份格式錯誤');
return;

}

if(!confirm(`確定匯入 ${imported.length} 筆資料？\n目前資料將被覆蓋。`)){
return;
}

docs = imported;

save();
render();

alert('備份匯入完成');

}catch(err){

alert('JSON格式錯誤');

}

};

reader.readAsText(file);

}


function render(){

const tbody = document.getElementById('tbody');

tbody.innerHTML='';

const isDonePage = currentFilter==='done';

document.querySelectorAll('.done-column').forEach(v=>{
v.style.display = isDonePage ? '' : 'none';
});

document.querySelectorAll('.done-cell').forEach(v=>{
v.style.display = isDonePage ? '' : 'none';
});


const now = new Date();
const todayFull = getLocalDateString(now);
const search = document.getElementById('search').value || '';

const doneStartDate =
document.getElementById('doneStartDate')?.value || '';

const doneEndDate =
document.getElementById('doneEndDate')?.value || '';

let pending=0,nodateCount=0,todayCount=0,overdue=0,done=0;

docs.forEach(v=>{
if(v.status!=='已發文') pending++;
if(v.status!=='已發文' && !v.sendDate) nodateCount++;
if(v.sendDate===todayFull && v.status!=='已發文') todayCount++;
if(v.sendDate && v.sendDate<todayFull && v.status!=='已發文') overdue++;
if(v.status==='已發文') done++;
});

let rows = [];

docs.forEach((d,i)=>{

const text = `${d.docNo} ${d.subject} ${d.handler}`;

if(search && !text.includes(search)) return;
if(currentFilter==='pending' && d.status==='已發文') return;
if(currentFilter==='nodate' && !(d.status!=='已發文' && !d.sendDate)) return;
if(currentFilter==='today' && !(d.sendDate===todayFull && d.status!=='已發文')) return;
if(currentFilter==='overdue' && !(d.sendDate && d.sendDate<todayFull && d.status!=='已發文')) return;
if(currentFilter==='done' && d.status!=='已發文') return;
if(currentFilter==='forecast' && !(d.sendDate===selectedForecastDate && d.status!=='已發文')) return;

if(currentFilter==='done'){

if(doneStartDate){

const start =
getLocalDateTimestamp(doneStartDate);

if((d.doneTimestamp||0) < start){
return;
}

}

if(doneEndDate){

const end =
getLocalDateTimestamp(doneEndDate,true);

if((d.doneTimestamp||0) > end){
return;
}

}

}

rows.push({d,i});

})

if(currentFilter==='done'){

rows.sort((a,b)=>
(b.d.doneTimestamp || 0)
-
(a.d.doneTimestamp || 0)
);

}else{
rows.sort((a,b)=>(a.d.sortOrder||999999)-(b.d.sortOrder||999999));
}

const totalRows = rows.length;

if(currentFilter==='done'){
const start=(currentPage-1)*pageSize;
rows=rows.slice(start,start+pageSize);
}else{
currentPage=1;
}

rows.forEach(({d,i})=>{

const tr = document.createElement('tr');

if(d.status==='已發文'){
tr.classList.add('done-row');
}

if(d.sendDate && d.sendDate<todayFull && d.status!=='已發文'){
tr.classList.add('overdue-row');
}

if(d.sendDate && d.displayDate && d.sendDate!==d.displayDate){
tr.style.background='#fff3e0';
}

tr.innerHTML = `
<td><input type="checkbox" class="batch-check" data-index="${i}"></td>

<td>${d.docNo}</td>

<td>
${d.url ? 
`<a class="subject-link" href="${d.url}" target="_blank">${d.subject}</a>` 
: d.subject}
</td>

<td>${d.handler}</td>

<td>
<div class="pill send-pill" onclick="openDateQuickModal(${i})">
${d.sendDate ? d.sendDate.replace(/^\d{4}-/,'').replace('-','/') : '未設定'}
</div>
<input id="send_${i}" class="hidden-date" type="date" value="${d.sendDate}" onchange="updateSend(${i},this.value)">
</td>

<td>
<div class="pill display-pill" onclick="document.getElementById('display_${i}').showPicker()">
${d.displayDate ? d.displayDate.replace(/^\d{4}-/,'').replace('-','/') : '未設定'}
</div>
<input id="display_${i}" class="hidden-date" type="date" value="${d.displayDate}" onchange="updateDisplay(${i},this.value)">
</td>

<td>
<select 
class="status-btn ${d.status==='已發文'?'done':'pending'}"
onchange="changeStatus(${i},this.value)">
<option value="待發" ${d.status==='待發'?'selected':''}>待發</option>
<option value="已發文" ${d.status==='已發文'?'selected':''}>已發文</option>
</select>
</td>

<td>
<input class="note" value="${d.note || ''}" oninput="updateNote(${i},this.value)" placeholder="輸入備註">
</td>

${isDonePage ? `<td class="done-cell">${d.doneTime || ""}</td>` : ``}
<td><button class="btn danger-soft" style="padding:6px 10px;min-height:34px;" onclick="deleteDoc(${i})" title="刪除">
<svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
<path d="M4 7h16"></path><path d="M9 7V4h6v3"></path><path d="m6 7 1 14h10l1-14"></path>
</svg>
</button></td>
`;

tbody.appendChild(tr);

});

const selectAll=document.getElementById('selectAllVisible');
const visibleChecks=[...document.querySelectorAll('.batch-check')];

selectAll.checked=false;
selectAll.indeterminate=false;
selectAll.disabled=visibleChecks.length===0;

visibleChecks.forEach(check=>{
check.addEventListener('change',updateSelectAllState);
});

document.getElementById('pendingBadge').innerText=pending;
document.getElementById('nodateBadge').innerText=nodateCount;
document.getElementById('todayBadge').innerText=todayCount;
document.getElementById('overdueBadge').innerText=overdue;
document.getElementById('doneBadge').innerText=done;

document.getElementById('pendingCount').innerText=pending;
document.getElementById('todayCount').innerText=todayCount;
document.getElementById('overdueCount').innerText=overdue;
document.getElementById('doneCount').innerText=done;



const warning = document.getElementById('warningBox');

if(overdue>0){
warning.style.display='block';
warning.innerText=`⚠ 目前有 ${overdue} 件已逾期未發文`;
}else{
warning.style.display='none';
}

renderForecast();

const pageBar=document.getElementById('paginationBar');
if(pageBar){
pageBar.innerHTML='';

if(currentFilter==='done'){

const totalPages=Math.ceil(totalRows/pageSize)||1;

pageBar.innerHTML=`<div style="margin-top:10px;font-weight:bold;">共 ${totalRows} 筆資料　第 ${currentPage} / ${totalPages} 頁</div>`;

const prev=document.createElement('button');
prev.className='btn blue';
prev.style.margin='6px';
prev.textContent='上一頁';
prev.disabled=currentPage===1;
prev.onclick=()=>{currentPage--;render();};
pageBar.appendChild(prev);

for(let p=1;p<=totalPages;p++){
if(totalPages>10 && !(p<=3 || p>totalPages-3 || p===currentPage)) continue;
const b=document.createElement('button');
b.className='btn';
b.style.margin='3px';
b.textContent=p;
b.onclick=()=>{currentPage=p;render();};
pageBar.appendChild(b);
}

const next=document.createElement('button');
next.className='btn blue';
next.style.margin='6px';
next.textContent='下一頁';
next.disabled=currentPage===totalPages;
next.onclick=()=>{currentPage++;render();};
pageBar.appendChild(next);
}

}

}

function toggleSelectAllVisible(checked){

document.querySelectorAll('.batch-check').forEach(check=>{
check.checked=checked;
});

updateSelectAllState();

}

function updateSelectAllState(){

const selectAll=document.getElementById('selectAllVisible');
const checks=[...document.querySelectorAll('.batch-check')];
const checkedCount=checks.filter(check=>check.checked).length;

selectAll.disabled=checks.length===0;
selectAll.checked=checks.length>0 && checkedCount===checks.length;
selectAll.indeterminate=checkedCount>0 && checkedCount<checks.length;

}

function renderForecast(){

const box = document.getElementById('forecastBox');
box.innerHTML='';

const today = new Date();

for(let i=0;i<7;i++){

const d = new Date();
d.setDate(today.getDate()+i);

const yyyy=d.getFullYear();
const mm=String(d.getMonth()+1).padStart(2,'0');
const dd=String(d.getDate()).padStart(2,'0');

const dateStr=`${yyyy}-${mm}-${dd}`;

const count = docs.filter(v=>v.sendDate===dateStr && v.status!=='已發文').length;

const div = document.createElement('div');

div.className='forecast-item';
div.title=`查看 ${mm}/${dd} 待發公文`;
div.onclick=()=>filterForecastDate(dateStr);

if(currentFilter==='forecast' && selectedForecastDate===dateStr){
div.classList.add('active');
}

if(i===0){
div.classList.add('forecast-today');
}

if(count>=5){
div.classList.add('forecast-danger');
}

div.innerHTML=`<span>${mm}/${dd}</span><span>${count} 件</span>`;

box.appendChild(div);

}

}

activeDateIndex=i;
document.getElementById('dateQuickModal').style.display='flex';
}

document.getElementById('dateQuickModal').style.display='none';

function applyCustomDate(){
const val=document.getElementById('modalDateInput').value;

updateSend(activeDateIndex,val);

}

function updateSend(i,val){

docs[i].sendDate=val;

if(!docs[i].displayDate){
docs[i].displayDate=val;
}

save();
render();

}

function quickDate(i,offset){

const d=new Date();
d.setDate(d.getDate()+offset);

const yyyy=d.getFullYear();
const mm=String(d.getMonth()+1).padStart(2,'0');
const dd=String(d.getDate()).padStart(2,'0');

docs[i].sendDate=`${yyyy}-${mm}-${dd}`;

if(!docs[i].displayDate){
docs[i].displayDate=docs[i].sendDate;
}

save();
render();
}


function updateDisplay(i,val){
docs[i].displayDate=val;
save();
render();
}

function updateNote(i,val){
docs[i].note=val;
save();
}

function changeStatus(i,val){

docs[i].status = val;

if(val==='已發文'){

const doneInfo = getDoneInfo();

docs[i].doneTimestamp = doneInfo.timestamp;
docs[i].doneTime = doneInfo.display;

}else{

docs[i].doneTime = '';
docs[i].doneTimestamp = 0;

}

save();
render();

}

function batchDone(){

const checks = document.querySelectorAll('.batch-check:checked');

if(checks.length===0){

alert('請先勾選資料');
return;

}

checks.forEach(c=>{

const i = Number(c.dataset.index);

docs[i].status='已發文';

const doneInfo = getDoneInfo();

docs[i].doneTimestamp = doneInfo.timestamp;
docs[i].doneTime = doneInfo.display;

});

save();
render();

alert('批次已發文完成');

}



function deleteDoc(i){

if(confirm('確定刪除這筆資料？')){

docs.splice(i,1);

save();
render();

}

}

function batchDelete(){

const checks = document.querySelectorAll('.batch-check:checked');

if(checks.length===0){

alert('請先勾選資料');
return;

}

if(!confirm(`確定刪除 ${checks.length} 筆資料？`)){
return;
}

const indexes = [];

checks.forEach(c=>{
indexes.push(Number(c.dataset.index));
});

indexes.sort((a,b)=>b-a);

indexes.forEach(i=>{
docs.splice(i,1);
});

save();
render();

alert('批次刪除完成');

}


function exportDoneExcel(){

document.getElementById('doneStartDate')?.value || '';

const endDate =
document.getElementById('doneEndDate')?.value || '';

const rows = docs.filter(v=>{

if(v.status !== '已發文'){
return false;
}

if(startDate){

const start =
getLocalDateTimestamp(startDate);

if((v.doneTimestamp||0) < start){
return false;
}

}

if(endDate){

const end =
getLocalDateTimestamp(endDate,true);

if((v.doneTimestamp||0) > end){
return false;
}

}

return true;

})
.sort((a,b)=>
(b.doneTimestamp||0)-
(a.doneTimestamp||0)
);

let csv =
'\uFEFF表單編號,主旨,承辦人,發文日期,公文顯示日期,完成時間,備註\n';

rows.forEach(r=>{

csv += [
    `"${r.docNo||''}"`,
    `"${r.subject||''}"`,
    `"${r.handler||''}"`,
    `"${r.sendDate||''}"`,
    `"${r.displayDate||''}"`,
    `"${r.doneTime||''}"`,
    `"${r.note||''}"`
].join(',') + '\n';

});

const blob = new Blob(
[csv],
{type:'text/csv;charset=utf-8;'}
);

const link = document.createElement('a');

link.href =
URL.createObjectURL(blob);

link.download =
'已發文清單_' +
getLocalDateString() +
'.csv';

link.click();

}
